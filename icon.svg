<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="doc1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="doc2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#f59e0b" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <line x1="0" y1="32" x2="128" y2="32" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="64" x2="128" y2="64" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="96" x2="128" y2="96" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  <line x1="32" y1="0" x2="32" y2="128" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  <line x1="64" y1="0" x2="64" y2="128" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  <line x1="96" y1="0" x2="96" y2="128" stroke="#334155" stroke-width="0.5" opacity="0.3"/>

  <!-- Back document -->
  <g filter="url(#shadow)">
    <rect x="18" y="18" width="44" height="56" rx="6" fill="url(#doc2)" opacity="0.6"/>
    <!-- Code lines -->
    <rect x="25" y="27" width="20" height="2.5" rx="1.25" fill="#0f172a" opacity="0.3"/>
    <rect x="25" y="33" width="30" height="2.5" rx="1.25" fill="#0f172a" opacity="0.3"/>
    <rect x="25" y="39" width="14" height="2.5" rx="1.25" fill="#0f172a" opacity="0.3"/>
    <rect x="25" y="45" width="26" height="2.5" rx="1.25" fill="#0f172a" opacity="0.3"/>
    <rect x="25" y="51" width="18" height="2.5" rx="1.25" fill="#0f172a" opacity="0.3"/>
    <rect x="25" y="57" width="24" height="2.5" rx="1.25" fill="#0f172a" opacity="0.3"/>
  </g>

  <!-- Front document -->
  <g filter="url(#shadow)">
    <rect x="44" y="32" width="44" height="56" rx="6" fill="url(#doc1)"/>
    <!-- Code lines -->
    <rect x="51" y="41" width="20" height="2.5" rx="1.25" fill="#0f172a" opacity="0.35"/>
    <rect x="51" y="47" width="30" height="2.5" rx="1.25" fill="#0f172a" opacity="0.35"/>
    <rect x="51" y="53" width="14" height="2.5" rx="1.25" fill="#0f172a" opacity="0.35"/>
    <rect x="51" y="59" width="26" height="2.5" rx="1.25" fill="#0f172a" opacity="0.35"/>
    <rect x="51" y="65" width="18" height="2.5" rx="1.25" fill="#0f172a" opacity="0.35"/>
    <rect x="51" y="71" width="24" height="2.5" rx="1.25" fill="#0f172a" opacity="0.35"/>
  </g>

  <!-- Equals/duplicate indicator between docs -->
  <rect x="35" y="48" width="12" height="2.5" rx="1.25" fill="#f59e0b" opacity="0.9"/>
  <rect x="35" y="53" width="12" height="2.5" rx="1.25" fill="#f59e0b" opacity="0.9"/>

  <!-- Merge arrow -->
  <g filter="url(#glow)">
    <line x1="52" y1="92" x2="52" y2="110" stroke="url(#arrow)" stroke-width="3.5" stroke-linecap="round"/>
    <polyline points="44,102 52,112 60,102" fill="none" stroke="url(#arrow)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Warning badge -->
  <g filter="url(#shadow)">
    <circle cx="98" cy="24" r="16" fill="url(#badge)"/>
    <!-- Exclamation mark using shapes -->
    <rect x="96" y="15" width="4" height="12" rx="2" fill="#fff"/>
    <circle cx="98" cy="32" r="2.5" fill="#fff"/>
  </g>
</svg>
